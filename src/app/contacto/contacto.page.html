<!-- Header de contacto -->
<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Contacto</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">

  <!-- Hero de contacto: título grande, sin centrar (izquierda alineado) -->
  <div class="contact-hero">
    <p class="contact-eyebrow">Disponible ahora</p>
    <h1 class="contact-title">¿Hablamos?</h1>
    <p class="contact-body">
      Estoy abierta a colaborar en proyectos desafiantes sobre desarrollo full-stack en ecosistemas de escritorio y móvil.
    </p>
  </div>

  <!-- Canales de contacto: lista suelta, sin card contenedora -->
  <div class="channels-list">

    <a class="channel-item" href="mailto:apakuamita17@proton.me">
      <div class="channel-icon-wrap">
        <ion-icon name="mail-outline"></ion-icon>
      </div>
      <div class="channel-info">
        <span class="channel-label">Email</span>
        <span class="channel-value">apakuamita17@proton.me</span>
      </div>
      <ion-icon name="chevron-forward-outline" class="channel-arrow"></ion-icon>
    </a>

    <a class="channel-item" href="tel:+584120760727">
      <div class="channel-icon-wrap">
        <ion-icon name="logo-whatsapp"></ion-icon>
      </div>
      <div class="channel-info">
        <span class="channel-label">WhatsApp</span>
        <span class="channel-value">(+58) 412 076 0727</span>
      </div>
      <ion-icon name="chevron-forward-outline" class="channel-arrow"></ion-icon>
    </a>

    <a class="channel-item" href="https://github.com/apakuamita17" target="_blank" rel="noopener">
      <div class="channel-icon-wrap">
        <ion-icon name="logo-github"></ion-icon>
      </div>
      <div class="channel-info">
        <span class="channel-label">GitHub</span>
        <span class="channel-value">apakuamita17</span>
      </div>
      <ion-icon name="chevron-forward-outline" class="channel-arrow"></ion-icon>
    </a>

    <div class="channel-item channel-static">
      <div class="channel-icon-wrap">
        <ion-icon name="location-outline"></ion-icon>
      </div>
      <div class="channel-info">
        <span class="channel-label">Ubicación</span>
        <span class="channel-value">Barquisimeto, Edo. Lara</span>
      </div>
    </div>

  </div>

  <!-- CTA de correo: botón sólido, full-width -->
  <div class="cta-wrapper">
    <ion-button expand="block" class="btn-send" href="mailto:apakuamita17@proton.me">
      Enviar correo
    </ion-button>
  </div>

</ion-content>
